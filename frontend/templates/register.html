<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Register - Commerce Analytics</title></head>
<body>
<h1>Register</h1>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}<p class="{{ category }}">{{ message }}</p>{% endfor %}
{% endwith %}
<form method="post">
  <label>Email: <input type="email" name="email" required></label><br>
  <label>Business Name: <input type="text" name="business_name" required></label><br>
  <label>Password: <input type="password" name="password" required minlength="8"></label><br>
  <button type="submit">Register</button>
</form>
<a href="/login">Login</a>
</body>
</html>
