<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forecast — Commerce Analytics</title>
  <script src="/static/js/vendor/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#060a12;color:#dde4f0;font-family:'Segoe UI',sans-serif;display:flex;min-height:100vh}
    a{color:#00d4aa;text-decoration:none}
    .sidebar{width:220px;min-height:100vh;background:#0a0e1c;border-right:1px solid rgba(0,212,170,.1);display:flex;flex-direction:column;padding:1.5rem 0;position:fixed;top:0;left:0}
    .sidebar-brand{padding:.25rem 1.5rem 1.5rem;font-size:1.1rem;font-weight:700;color:#00d4aa;border-bottom:1px solid rgba(0,212,170,.1);margin-bottom:1rem}
    .sidebar nav a{display:flex;align-items:center;gap:.7rem;padding:.65rem 1.5rem;color:#8a9bb5;font-size:.9rem;transition:all .18s}
    .sidebar nav a:hover,.sidebar nav a.active{color:#00d4aa;background:rgba(0,212,170,.07)}
    .sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid rgba(0,212,170,.08)}
    .sidebar-footer a{color:#8a9bb5;font-size:.85rem}
    .main{margin-left:220px;flex:1;padding:2rem 2.25rem}
    .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
    .topbar h1{font-size:1.5rem;font-weight:700;color:#fff}
    .horizon-row{display:flex;gap:.5rem;align-items:center}
    .horizon-row label{font-size:.85rem;color:#8a9bb5;margin-right:.25rem}
    .horizon-btn{padding:.35rem .9rem;border-radius:6px;border:1px solid rgba(0,212,170,.2);background:transparent;color:#8a9bb5;font-size:.85rem;cursor:pointer}
    .horizon-btn.active{background:rgba(0,212,170,.15);color:#00d4aa;border-color:#00d4aa}
    .card{background:#0d1626;border:1px solid rgba(0,212,170,.14);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
    .card h3{font-size:1rem;font-weight:600;color:#fff;margin-bottom:1rem}
    .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
    .metric-card{background:#0d1626;border:1px solid rgba(0,212,170,.14);border-radius:12px;padding:1.1rem 1.3rem;text-align:center}
    .metric-card .label{font-size:.78rem;color:#8a9bb5;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
    .metric-card .value{font-size:1.45rem;font-weight:700;color:#fff}
    .summary-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem}
    .summary-item{background:rgba(0,212,170,.05);border:1px solid rgba(0,212,170,.1);border-radius:8px;padding:.75rem 1rem}
    .summary-item .key{font-size:.78rem;color:#8a9bb5;margin-bottom:.25rem}
    .summary-item .val{font-size:.9rem;color:#dde4f0;font-weight:500}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">⚡ Commerce</div>
    <nav>
      <a href="/client">📊 Dashboard</a>
      <a href="/client/upload">📦 Upload</a>
      <a href="/client/analytics">📈 Analytics</a>
      <a href="/client/forecast" class="active">🔮 Forecast</a>
      <a href="/client/reports">📄 Reports</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout">⬅ Sign Out</a>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>Sales Forecast</h1>
      <div class="horizon-row">
        <label>Horizon:</label>
        <button class="horizon-btn" onclick="loadForecast(14,this)">14 days</button>
        <button class="horizon-btn active" onclick="loadForecast(30,this)">30 days</button>
        <button class="horizon-btn" onclick="loadForecast(60,this)">60 days</button>
        <button class="horizon-btn" onclick="loadForecast(90,this)">90 days</button>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card"><div class="label">MAE</div><div class="value" id="mae">—</div></div>
      <div class="metric-card"><div class="label">RMSE</div><div class="value" id="rmse">—</div></div>
      <div class="metric-card"><div class="label">MAPE</div><div class="value" id="mape">—</div></div>
    </div>

    <div class="card">
      <h3>Revenue Forecast</h3>
      <canvas id="forecast-chart" height="80"></canvas>
    </div>

    <div class="card" id="summary-card">
      <h3>Model Summary</h3>
      <div class="summary-list" id="summary-list"><div style="color:#8a9bb5;font-size:.9rem">Loading…</div></div>
    </div>
  </div>

  <script>
    let forecastChart = null;

    function loadForecast(horizon, btn) {
      document.querySelectorAll('.horizon-btn').forEach(b=>b.classList.remove('active'));
      if(btn) btn.classList.add('active');

      fetch('/api/client/forecast?horizon='+horizon).then(r=>r.json()).then(data=>{
        const labels = data.map(d=>d.date||d.ds||'');
        const yhat = data.map(d=>d.yhat||d.forecast||d.value||0);
        const upper = data.map(d=>d.yhat_upper||d.upper||null);
        const lower = data.map(d=>d.yhat_lower||d.lower||null);
        if(forecastChart) forecastChart.destroy();
        const datasets = [{
          label:'Forecast',data:yhat,borderColor:'#00d4aa',backgroundColor:'rgba(0,212,170,.12)',tension:.35,fill:false,pointRadius:2
        }];
        if(upper[0]!=null) datasets.push({label:'Upper',data:upper,borderColor:'rgba(0,212,170,.3)',borderDash:[4,3],fill:false,pointRadius:0});
        if(lower[0]!=null) datasets.push({label:'Lower',data:lower,borderColor:'rgba(0,212,170,.3)',borderDash:[4,3],fill:false,pointRadius:0});
        forecastChart = new Chart(document.getElementById('forecast-chart'),{
          type:'line',
          data:{labels,datasets},
          options:{responsive:true,plugins:{legend:{labels:{color:'#8a9bb5'}}},scales:{x:{ticks:{color:'#8a9bb5',maxTicksLimit:12},grid:{color:'rgba(255,255,255,.06)'}},y:{ticks:{color:'#8a9bb5'},grid:{color:'rgba(255,255,255,.06)'}}}}
        });
      }).catch(()=>{});
    }

    // Accuracy metrics
    fetch('/api/client/forecast/accuracy').then(r=>r.json()).then(d=>{
      document.getElementById('mae').textContent = d.mae!=null ? d.mae.toFixed(2) : 'N/A';
      document.getElementById('rmse').textContent = d.rmse!=null ? d.rmse.toFixed(2) : 'N/A';
      document.getElementById('mape').textContent = d.mape!=null ? d.mape.toFixed(2)+'%' : 'N/A';
    }).catch(()=>{});

    // Model summary
    fetch('/api/client/forecast/summary').then(r=>r.json()).then(d=>{
      const list = document.getElementById('summary-list');
      const items = Object.entries(d).map(([k,v])=>`<div class="summary-item"><div class="key">${k}</div><div class="val">${v}</div></div>`).join('');
      list.innerHTML = items || '<div style="color:#8a9bb5;font-size:.9rem">No summary available.</div>';
    }).catch(()=>{ document.getElementById('summary-list').innerHTML='<div style="color:#8a9bb5;font-size:.9rem">Not available.</div>'; });

    loadForecast(30, null);
  </script>
</body>
</html>
